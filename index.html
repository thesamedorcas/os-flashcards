{u:'Networking',q:'Network vs host byte order — conversion functions',
a:'Problem: different architectures use different byte orders for multi-byte integers. Big Endian: A[0] = highest order byte. Little Endian: A[0] = lowest order byte. Internet architects chose big-endian as network byte order for consistency on the wire. Conversion functions from arpa/inet.h: htonl(hostlong) host to network 32-bit. htons(hostshort) host to network 16-bit. ntohl(netlong) network to host 32-bit. ntohs(netshort) network to host 16-bit. Always use these when setting port numbers and IP addresses in socket structs (sin_port, sin_addr).'},
{u:'Networking',q:'eBPF — Extended Berkeley Packet Filter',
a:'Execute sandboxed programs in privileged kernel context. Suitable for networking, security, and tracing. User-space applications hook into kernel-level events. Originally for packet filtering, now much more general. eBPF programs compiled with special C compiler and run in a sandboxed virtual machine in the kernel. Programs are verified to be safe before execution. Can create kernel probes (kprobe) or user probes (uprobe) for custom hooks. Motivation: networking stack buffer copies are slow and kernel/user context switching is expensive. eBPF avoids the context switch overhead.'},
{u:'Networking',q:'Networking analogies to OS concepts',
a:'"Networks are distributed virtual memory." "Networks are distributed I/O." "Routing in Networks is distributed pointers." "URL to IP (DNS) are distributed page tables." These analogies show up in exam short answers. The pattern: networking is an extension of local OS concepts to distributed systems. Socket buffers link control with memory using a pointer plus length field to allow direct data manipulation without copying header data between protocols.'},

// =====================================================================
// SECURITY
// =====================================================================
{u:'Security',q:'System security and principle of least privilege',
a:'System security = prevention of unauthorised access and operation, and protection from malicious actors who might steal, inject, or manipulate data, cause damage, or disrupt services. Principle of Least Privilege: programs, users, and systems should be given just enough privileges to perform their tasks. Properly set permissions limit damage if entity has a bug or gets abused. Can be static (during life of system/process) or dynamic (changed as needed — domain switching, privilege escalation). Compartmentalisation is a derivative concept: protecting each individual system component through specific permissions and access restrictions. Privilege grain is a design choice — "no silver bullet": few large levels = simple, low overhead, may not be fit for purpose (e.g. traditional Linux: root or user). Many fine-grained levels = more complexity, more management overhead (e.g. ACLs). Everything in security is a design choice. Audit Trails: record all protection-oriented activities. Examples: dmesg, /var/log/messages.'},
{u:'Security',q:'Protection rings',
a:'Components ordered by privilege level, protected from each other. Kernel in ring 0 (most privileged); user apps in ring 3. Requires hardware support. Gates (syscall, trap, interrupt) used to transfer between levels. Modern additions: hypervisors introduced another ring. ARMv7 TrustZone: protects crypto functions via Secure Monitor Call (SMC) instruction. Protects NFC secure element and crypto keys from even the kernel. Rule: if j < i then Domain_i is a subset of Domain_j (inner rings have strictly more privileges than outer rings).'},
{u:'Security',q:'Access matrix — domains, objects, and access rights',
a:'Computer treated as processes and objects. Hardware objects (devices) and software objects (files, programs, semaphores). Principle of need-to-know: process should only have access to objects it currently requires. Access right = <object-name, rights-set>. Domain = set of access rights = a row in the access matrix. Access matrix: rows = domains, columns = objects. Access(i,j) = operations domain i can invoke on object j. If process in domain Di tries op on object Oj, op must be in cell (i,j). Domains may share access rights. Associations can be static or dynamic — if dynamic, processes can domain switch. Can be expanded to dynamic protection (operations to add/delete access rights). Separates mechanism from policy: Mechanism = OS provides the access-matrix and rules, ensures matrix is only manipulated by authorised agents and rules are strictly enforced. Policy = user dictates who can access what object and in what mode.'},
{u:'Security',q:'Access matrix with domains as objects — "switch" right',
a:'Domains themselves can be columns (objects) in the access matrix. A "switch" entry in cell (i, Dj) means a process in domain Di is allowed to switch into domain Dj. Without a switch right, a process cannot enter that domain. This enables controlled privilege escalation: a domain can be granted the right to switch into a more privileged domain, but only if the matrix explicitly permits it. This is the formal model behind su, sudo, and setuid — they are all implementations of the switch right. The access matrix can be extended with operations to add and delete rights dynamically, enabling dynamic protection.'},

{u:'Security',q:'ACL vs capability lists',
a:'Access Control Matrix scales poorly — most cells are empty. Access Control List (ACL): store permissions per object. Lists only subjects that have access to that specific resource. Convenient to see who can access a resource. Not convenient to audit a specific user\'s rights across all objects. Capability List: store permissions per subject. Lists only objects the subject can access. Convenient to see all resources a user can access. Not convenient to find who has access to a specific resource. Linux capabilities: slices root powers into bitmap bits. Three sets: permitted, effective, inheritable.'},
{u:'Security',q:'DAC vs MAC',
a:'DAC (Discretionary Access Control): traditional UNIX permissions and Windows ACLs. Users and admins must actively increase protection. Root can bypass all DAC restrictions. "Discretionary" is a weakness — if an account is compromised, attacker inherits all its access rights. MAC (Mandatory Access Control): even root cannot circumvent. Makes resources inaccessible except to intended owners. Labels assigned to objects and subjects. Policy checked on every access attempt. Examples: SELinux, TrustedBSD (macOS), Trusted Solaris, Windows Vista MAC. Modern systems implement both.'},
{u:'Security',q:'RBAC — Role-Based Access Control',
a:'Protection applied to non-file resources. Privilege = right to execute a syscall or use an option within a syscall. Privileges assigned to processes. Users assigned roles granting access to privileges and programs. Enable a role via password to gain its privileges. Similar in concept to the access matrix. Example: Oracle Solaris 10 RBAC. Compared to traditional root/user binary: RBAC is more fine-grained, more flexible, more aligned with least-privilege. Domain switching methods: filesystem (setuid bit), passwords (su command), or commands (sudo prefix).'},
{u:'Security',q:'Buffer overflow, stack smashing, and defences',
a:'Buffer overflow: reading/writing more data than a buffer can hold. Stack smashing: overwrite return address → enable arbitrary code execution or crash. Common in C/C++ which allow direct memory access through pointers. gets() and strcpy() are dangerous — no bounds checking. Be careful with integer signedness in string lengths. Always sanitise strings going to database or exec calls. Defences: bounds checking, ASLR (randomise stack/heap/library positions), NX bit (mark stack/heap as non-executable), Pointer Authentication Codes (PAC) — ARM hardware defence. Return-to-libc attacks bypass NX bit alone.'},
{u:'Security',q:'Capability data fields — structure of a capability token',
a:'A capability token has four fields: tag — identifies this as a capability (not arbitrary data, prevents forgery). base pointer — points to the start of the object or region the capability grants access to. limit — the size/end of the accessible region (prevents out-of-bounds access). metadata — additional info such as which operations are permitted (read, write, execute) and other access rights. The tag field is the key to unforgeability: hardware or a trusted kernel ensures tags cannot be set by untrusted code. Compare to a file descriptor: a capability is like a file descriptor but generalised to any object and carrying its own access rights. The combination of base + limit prevents buffer overflows when capabilities are enforced in hardware.'},

{u:'Security',q:'Sandboxing and capabilities',
a:'Sandboxing: run process in limited environment. Impose irremovable restrictions before main() runs. Process cannot access resources beyond allowed set. Java/.NET implement at VM level. Apple macOS: seatbelt feature from macOS 10.5 — dynamic profiles written in the Scheme language, managing system calls even at the argument level. Apple SIP = system-wide platform profile. Capabilities (Linux/Android, based on POSIX.1e — never became a standard): "an unforgeable token of authority that grants particular rights to perform an action in an execution context." Hydra and CAP were the first capability-based systems. Slices root powers into distinct areas, each represented by a bitmap bit. Three sets: permitted, effective, inheritable. Per process or per thread. Process or thread starts with all privileges, voluntarily decreases its set during execution. Once revoked, cannot be reacquired. Direct implementation of the principle of least privilege.'},
{u:'Security',q:'Fork bomb, ulimit, and DoS attacks',
a:'Fork bomb: fork() { fork | fork & }; fork — process recursively forks copies of itself, exhausts system resources, denies service to other users on shared machine. Also called a wabbit. Prevention: ulimit. ulimit -a (view current limits). ulimit -u 50 (max 50 processes per user). ulimit can cap: max processes forked, max files open, and other resource limits. Fork bomb = local DoS. Network DoS: remote nodes flood server with requests using botnets (examples: Mirai, Estonia attacks). Mitigation: static firewalls, signature-based IDS (snort), anomaly-detection (machine learning).'},
{u:'Security',q:'Code injection and privilege grain',
a:'Code injection: system code has bugs allowing executable code to be added or modified. Results from poor/insecure programming in C/C++. Goal: buffer overflow → place code in buffer → cause execution. Often uses a trampoline to exploit buffer overflow. Full defence stack: bounds checking + ASLR + NX bit + Pointer Authentication Codes. Privilege grain design choice: few large levels = simple, low overhead, may not be fit for purpose. Many fine-grained levels = more complexity, more management overhead. Compartmentalisation: protect each component through specific permissions and access restrictions.'},
{u:'Security',q:'Compartmentalisation and audit trails',
a:'Compartmentalisation: protecting each individual system component through specific permissions and access restrictions. Each component only has access to what it needs. If one component is compromised, the damage is limited to its compartment. Audit Trails: recording all protection-oriented activities is important for understanding what happened, why, and catching what shouldn\'t have happened. Linux audit tools: dmesg (kernel messages), /var/log/messages (system log), journalctl. Important for post-mortems after a security incident. SE Linux policies specify what each process can/cannot access as an additional layer on top of standard permissions.'},

// --- MEMORY: virtual address space layout ---
{u:'Memory',q:'32-bit virtual address space layout in Linux',
a:'32-bit processor can address 2^32 = 4,294,967,296 bytes = 4GB virtual address space. Linux 3:1 split (default on most 32-bit): 0 to 3GB = user space, 3GB to 4GB = kernel space. 2:2 split used on default Raspberry Pi Linux. User space layout (low to high): program code, static data, heap (grows up from program break), unallocated space, stack (grows down, pointed to by %esp). %esp = stack pointer register. Program break (brk pointer) = top of heap. Kernel always mapped at top of every process\'s address space for fast syscall access.'},

// --- MEMORY: contiguous allocation mapping calculation ---
{u:'Memory',q:'Contiguous file allocation — address mapping formula',
a:'Each file occupies a set of contiguous blocks. Only need starting block address and file length to locate any block. Mapping formula (block size = 512 bytes): Given logical address (LA): Q = LA / 512 (integer division) = block offset from start. R = LA mod 512 = displacement into that block. Physical block = starting address + Q. Access byte at displacement R within that block. Supports random access. Problems: external fragmentation (free space is scattered), must know file size at creation time.'},

// --- FILESYSTEMS: linked allocation mapping calculation ---
{u:'Filesystems',q:'Linked file allocation — address mapping formula',
a:'Each block contains a pointer to the next block (P = 4 bytes for pointer). Data per block = block_size - P = 512 - 4 = 508 bytes. Mapping formula: Given logical address (LA): Q = LA / (block_size - P) = which block in the linked chain (0-indexed). R = LA mod (block_size - P) = displacement into that block. Must traverse Q pointers from first block to reach the target. Access byte at position R + P within the block (skip the pointer). Does NOT support random access — must traverse chain. No external fragmentation.'},

// --- FILESYSTEMS: FAT filesystem ---
{u:'Filesystems',q:'FAT — File Allocation Table filesystem (EXAMINABLE)',
a:'FAT is a linked allocation filesystem used in DOS/Windows. The File Allocation Table is an in-memory array where each entry corresponds to a disk block (cluster). Each FAT entry contains: the index of the next block in the file, OR a special end-of-file marker, OR 0 for a free block. Directory entries store the starting block number for each file. To read a file: look up starting block in directory, follow FAT chain until end-of-file. FAT12, FAT16, FAT32 vary by size of each FAT entry (12, 16, 32 bits). FAT32 supports up to 4GB files. Simple, low overhead, widely compatible — good for embedded/removable media.'},

// --- FILESYSTEMS: FAT vs iNode comparison ---
{u:'Filesystems',q:'FAT vs iNode/indexed allocation — key difference',
a:'FAT (linked in a table): allocation info stored centrally in one big table (the FAT). Easy to find free space (scan FAT for 0 entries). Table must be kept in memory for performance. Fragmented chains = slow sequential reads. iNode (indexed allocation): each file has its own index block (inode) with direct pointers plus single/double/triple indirect pointers. Allocation info is per-file and distributed. No single point of failure. Supports much larger files. Linux ext2/ext3/ext4 use inodes. FAT is better for simple/embedded use. iNode is better for general-purpose OS use with large files and many files.'},

// --- SCHEDULING: scheduling queue structure in Linux ---
{u:'Scheduling',q:'Linux scheduling queue structure',
a:'The Linux kernel schedules threads, not processes. There is one run queue per priority level. High Priority Queue (real-time: 0-99) and Low Priority Queue (normal: 100-139). A classifier assigns each thread to the appropriate queue based on its scheduling policy and priority. The scheduler picks the head of the highest non-empty queue. Soft real-time thread queues: linked list with a bitmap indicating which queues are non-empty (for fast lookup). CFS (Completely Fair Scheduler) manages the normal priority queues using a red-black tree sorted by virtual runtime.'},

// --- PROCESSES: MentOS context ---
{u:'Processes',q:'MentOS — what it is and why it matters for this course',
a:'MentOS is a didactic Unix-like OS used in the COMPSCI4011 labs at Glasgow. It is a real, buildable OS written in C that implements all the OS concepts from the lectures. Lab exercises include: writing process scheduling algorithms in MentOS (FCFS, RR, SJF), context switch code, interrupt handlers. Key MentOS data structures: task_struct (process/thread context), thread_struct_t (processor context — registers, PC, SP, about 500 bytes on 32-bit ARM). thread_info: per-thread admin information. Key file: mentos/inc/process/process.h. Lab content is examinable.'},

// --- CONCURRENCY: condition variables ---
{u:'Concurrency',q:'Condition variables — definition and usage',
a:'A condition variable allows a thread to block until a specific condition on shared data is true. Always used together with a mutex — the mutex protects the shared data, the condition variable signals when the data has changed. Pattern: lock mutex, while condition is not met then wait on condition variable (atomically releases mutex and blocks), recheck condition, unlock mutex. POSIX: pthread_cond_t cond; pthread_cond_wait(&cond, &mutex) — atomically releases mutex and waits. pthread_cond_signal(&cond) — wake one waiting thread. pthread_cond_broadcast(&cond) — wake all waiting threads. Use condition variables when you need to wait for a state change, not just mutual exclusion.'},

// --- CONCURRENCY: producer-consumer with locks ---
{u:'Concurrency',q:'Producer-consumer problem — solution with locks',
a:'Shared buffer of size N, shared count variable, shared in/out indices. Problem: count++ and count-- each compile to multiple machine instructions, causing a race condition. Solution: wrap both producer and consumer critical sections with the same lock. acquire(lock) before modifying buffer/count, release(lock) after. This ensures only one of producer or consumer is in the critical section at a time. Full solution also needs: producer to wait if count==N (buffer full), consumer to wait if count==0 (buffer empty). Use condition variables or semaphores for the wait conditions. Mutex alone just ensures mutual exclusion, not ordering.'},

// --- MEMORY: NRU bit mechanics detail ---
{u:'Memory',q:'NRU — Referenced and Modified bit mechanics',
a:'When a process starts: R=0, M=0 for all pages. Referenced bit R: set to 1 when the page is read or written. Periodically (on timer interrupt) R is reset to 0 — this is how "recently" is measured. Modified bit M: set to 1 when the page is written to after loading from storage. M is never periodically reset (only cleared when page is swapped out). Four NRU categories: 0 = R=0,M=0 (not referenced, not modified — best to evict). 1 = R=0,M=1 (not referenced, but modified — must write to disk before evicting). 2 = R=1,M=0 (recently referenced, not modified). 3 = R=1,M=1 (recently referenced and modified — worst to evict). Evict from lowest non-empty category.'},

// --- MEMORY: NUMA ---
{u:'Memory',q:'NUMA — Non-Uniform Memory Access',
a:'NUMA: computer memory architecture where access times differ depending on the distance between the processor and where the memory is stored. In a multi-CPU system, each CPU has local memory that it accesses faster, and remote memory (other CPUs\' local memory) that it accesses slower. Linux NUMA policies: Interleaved — allocate memory in round-robin across all nodes, ensures average access times are uniform. Node-local — allocate memory close to the processor executing the malloc(), assumes memory will mostly be accessed by threads on the same NUMA region. Processor caches reduce access latency variance. Used in servers and HPC systems.'},

// --- HARDWARE: what happens on boot ---
{u:'Hardware',q:'What happens when you press the power button — boot sequence',
a:'1. Power supplied to hardware. 2. CPU starts in kernel mode at a fixed physical address (reset vector). 3. Firmware (BIOS/UEFI) runs: POST (power-on self-test), finds boot device. 4. Bootloader (e.g. GRUB) loaded from boot device: finds kernel image on disk. 5. Kernel image loaded into memory, control transferred to kernel. 6. Kernel initialises: sets up interrupt vector table, initialises MMU, sets up memory management, starts device drivers. 7. Kernel launches init process (PID 1). 8. init starts system services and eventually the user environment. System boots in kernel mode throughout; user mode begins only when user processes are started.'},

// --- NETWORKING: socket binding detail ---
{u:'Networking',q:'bind() — associating a socket with a port',
a:'bind() assigns an address to a socket so clients can find it. Before bind(), zero out the sockaddr_in structure. Set: sin_family = AF_INET, sin_addr.s_addr = htonl(INADDR_ANY) (accept from any network interface), sin_port = htons(PORT) (convert port to network byte order). bind(sockfd, (struct sockaddr *)&addr, sizeof(addr)). INADDR_ANY: server machines often have multiple network interfaces — this binds to all of them. bind() is required for servers. Clients typically do not call bind() explicitly for TCP (OS assigns ephemeral port automatically). For UDP, clients must bind() to receive replies.'},

// --- SECURITY: setuid and domain switching ---
{u:'Security',q:'setuid bit and domain switching mechanisms',
a:'Domain switching = temporarily running with a different user\'s privileges. Three mechanisms: (1) Filesystem (setuid bit): each file has a setuid bit. When executed with setuid=on, the process runs with the file owner\'s UID, not the caller\'s. When execution completes, UID is reset. (2) Passwords (su command): "become that user" temporarily by providing their password. Switches domain for the session. (3) Commands (sudo prefix): executes one command in another domain (root typically). Requires the original domain to have sudo privilege or provide correct password. Principle: domain switching enables delegation of specific privileges without permanently elevating a user.'},

// --- PROCESSES: C signals syntax ---
{u:'Processes',q:'Unix signals — common signals and C handling',
a:'Common Unix signals: SIGINT (2) — Ctrl+C, interrupt from keyboard. SIGTERM (15) — polite termination request, can be caught. SIGKILL (9) — force kill, cannot be caught or ignored. SIGSTOP (19) — pause process, cannot be caught. SIGCONT (18) — resume stopped process. SIGCHLD (17) — child process stopped or terminated. SIGUSR1/SIGUSR2 — user-defined. SIGSEGV (11) — segmentation fault. SIGALRM — timer expired. In C: signal(SIGINT, handler_fn) — register handler. raise(SIGTERM) — send signal to self. kill(pid, SIGTERM) — send to another process. kill -9 PID from shell = SIGKILL. Signals are async — handler runs between any two instructions.'},
]; // end ALL_CARDS

let activeUnit='all', deck=[...ALL_CARDS], idx=0, flipped=false, touchStartX=0;

const STATE_KEY='osfc_state';
function saveState(){try{localStorage.setItem(STATE_KEY,JSON.stringify({unit:activeUnit,idx}));}catch(e){}}
function loadState(){try{const s=JSON.parse(localStorage.getItem(STATE_KEY)||'{}');if(s.unit){activeUnit=s.unit;deck=activeUnit==='all'?[...ALL_CARDS]:ALL_CARDS.filter(c=>c.u===activeUnit);}if(typeof s.idx==='number'&&s.idx>=0&&s.idx<deck.length)idx=s.idx;}catch(e){}}

function unitLabel(id){return(UNITS.find(u=>u.id===id)||{}).label||id;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function updateCounter(){
const el=document.getElementById('topCounter');
if(el&&deck.length)el.innerHTML=`<span>${idx+1}</span> / ${deck.length}`;
}

function renderCard(dir){
const card=deck[idx];
document.getElementById('main').innerHTML=`
<div class="progress-bar"><div class="progress-fill" style="width:${((idx+1)/deck.length)*100}%"></div></div>
<div class="card-scene" id="cardScene">
<div class="card${flipped?' flipped':''}" id="theCard">
<div class="card-face card-front">
<div class="card-header">
<div class="card-type">Topic</div>
<div class="card-unit">${esc(unitLabel(card.u))}</div>
</div>
<div class="card-body"><div class="card-text">${esc(card.q)}</div></div>
<div class="card-mark">Q</div>
<div class="card-hint">tap card &middot; press flip &middot; swipe</div>
</div>
<div class="card-face card-back">
<div class="card-header">
<div class="card-type">Detail</div>
<div class="card-unit">${esc(unitLabel(card.u))}</div>
</div>
<div class="card-body"><div class="card-text">${esc(card.a)}</div></div>
<div class="card-mark">A</div>
</div>
</div>
</div>
<div class="nav">
<button class="nav-btn" id="prevBtn">&#8592;</button>
<button class="flip-btn" id="flipBtn">${flipped?'unflip':'flip'}</button>
<button class="nav-btn" id="nextBtn">&#8594;</button>
</div>
<div class="swipe-hint">&#8592; &#8594; arrow keys &middot; space to flip</div>`;
updateCounter();
if(dir){
const s=document.getElementById('cardScene');
s.classList.add(dir===1?'slide-right':'slide-left');
setTimeout(()=>s.classList.remove('slide-right','slide-left'),300);
}
document.getElementById('theCard').addEventListener('click',toggleFlip);
document.getElementById('flipBtn').addEventListener('click',toggleFlip);
document.getElementById('prevBtn').addEventListener('click',()=>navigate(-1));
document.getElementById('nextBtn').addEventListener('click',()=>navigate(1));
const sc=document.getElementById('cardScene');
sc.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
sc.addEventListener('touchend',e=>{const dx=touchStartX-e.changedTouches[0].clientX;if(Math.abs(dx)>50)navigate(dx>0?1:-1);});
}

function toggleFlip(){
flipped=!flipped;
document.getElementById('theCard')?.classList.toggle('flipped',flipped);
const b=document.getElementById('flipBtn');
if(b)b.textContent=flipped?'unflip':'flip';
}

function navigate(dir){idx=((idx+dir)+deck.length)%deck.length;flipped=false;saveState();renderCard(dir);}

function renderUnitStrip(){
const strip=document.getElementById('unitStrip');
strip.innerHTML=UNITS.map(u=>`<button class="unit-tab${u.id===activeUnit?' active':''}" data-id="${u.id}">${u.label}</button>`).join('');
strip.querySelectorAll('.unit-tab').forEach(btn=>{
btn.addEventListener('click',()=>{
activeUnit=btn.dataset.id;
deck=activeUnit==='all'?[...ALL_CARDS]:ALL_CARDS.filter(c=>c.u===activeUnit);
idx=0;flipped=false;saveState();
strip.querySelectorAll('.unit-tab').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
renderCard(null);
});
});
}

document.addEventListener('keydown',e=>{
if(e.key==='ArrowRight')navigate(1);
else if(e.key==='ArrowLeft')navigate(-1);
else if(e.key===' '||e.key==='Enter'){e.preventDefault();toggleFlip();}
});

loadState();
renderUnitStrip();
renderCard(null);
</script>
</body>
</html>
